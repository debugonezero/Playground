<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Playground</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        // GLOBAL STATE: The "Soul" of the Lab
        const state = {
            device: null,
            ctx: null,
            currentId: null,
            size: { w: window.innerWidth, h: window.innerHeight }
        };

        // 1. Initialize Hardware
        async function initGPU() {
            if (!navigator.gpu) return alert("WebGPU not supported");
            const adapter = await navigator.gpu.requestAdapter();
            state.device = await adapter.requestDevice();
            console.log("Hardware Initialized");
        }

        // 2. The Execution Bridge (The Missing Logic)
        function executePayload(p) {
            if (state.currentId === p.id) return; // Don't reload if nothing changed
            state.currentId = p.id;

            // Update DOM
            document.getElementById('canvas-container').innerHTML = p.html;

            // Ignite JS logic
            try {
                // Pass 'p' and 'state' as local scope to the payload
                const runner = new Function('p', 'state', p.js);
                runner(p, state);
            } catch (e) {
                console.error("Axiom Execution Error:", e);
            }
        }

        // 3. The Polling Loop (The "Watcher")
        async function watch() {
            try {
                const res = await fetch('payload.json?t=' + Date.now());
                const p = await res.json();
                executePayload(p);
            } catch (e) {
                console.warn("Waiting for valid payload.json...");
            }
            setTimeout(watch, 1000); // Check every second
        }

        // 4. Handle Resizing
        window.addEventListener('resize', () => {
            state.size.w = window.innerWidth;
            state.size.h = window.innerHeight;
        });

        // Start the Engine
        initGPU().then(watch);
    </script>
</body>
</html>
