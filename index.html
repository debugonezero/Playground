<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DebugOneZero | Universal Shell</title>
    <style id="dynamic-css">
        :root { --bg: #000; --accent: #00ffcc; }
        body { background: var(--bg); color: white; font-family: monospace; height: 100dvh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        #render-target { flex-grow: 1; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        #dock { background: #0a0a0a; padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; padding-bottom: env(safe-area-inset-bottom); }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; background: var(--accent); color: #000; }
        #log { position: absolute; top: 10px; left: 10px; font-size: 0.6rem; color: #444; pointer-events: none; }
    </style>
</head>
<body>

<div id="render-target">
    <div id="log">SYSTEM READY // WAITING FOR PAYLOAD</div>
    <canvas id="gpuCanvas"></canvas>
</div>

<div id="dock">
    <button id="universalBtn">Inject Clipboard Payload</button>
</div>

<script type="module">
    // --- Core GPU Scaffolding ---
    let device, context, format, pipeline, bindGroup, uniformBuffer;
    
    async function initGPU() {
        if (!navigator.gpu) return;
        const adapter = await navigator.gpu.requestAdapter();
        device = await adapter.requestDevice();
        const canvas = document.getElementById('gpuCanvas');
        context = canvas.getContext('webgpu');
        format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'premultiplied' });
        uniformBuffer = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        requestAnimationFrame(frame);
    }

    function frame(time) {
        if (pipeline) {
            device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([time * 0.001, 55, 1, 2]));
            const enc = device.createCommandEncoder();
            const pass = enc.beginRenderPass({ colorAttachments: [{ view: context.getCurrentTexture().createView(), clearValue: [0, 0, 0, 1], loadOp: 'clear', storeOp: 'store' }] });
            pass.setPipeline(pipeline); pass.setBindGroup(0, bindGroup);
            pass.draw(200 * 200); pass.end();
            device.queue.submit([enc.finish()]);
        }
        requestAnimationFrame(frame);
    }

    // --- The Universal Router ---
    async function inject() {
        const text = await navigator.clipboard.readText();
        const log = document.getElementById('log');

        // 1. Detect WGSL (Shader)
        if (text.includes("struct") || text.includes("@vertex")) {
            try {
                const shaderModule = device.createShaderModule({ code: text });
                pipeline = device.createRenderPipeline({
                    layout: 'auto',
                    vertex: { module: shaderModule, entryPoint: 'vs_main' },
                    fragment: { module: shaderModule, entryPoint: 'fs_main', targets: [{ format }] },
                    primitive: { topology: 'point-list' }
                });
                bindGroup = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: [{ binding: 0, resource: { buffer: uniformBuffer } }] });
                log.innerText = "GPU PAYLOAD: EXECUTED";
            } catch(e) { log.innerText = "GPU ERROR: " + e.message; }
        } 
        // 2. Detect HTML/JS (App Logic)
        else if (text.includes("<") || text.includes("function") || text.includes("document.")) {
            try {
                const container = document.getElementById('render-target');
                // If it's a full block, we can eval it or inject it
                const script = document.createElement('script');
                script.text = text.replace(/<script>|<\/script>/g, '');
                document.body.appendChild(script);
                log.innerText = "DOM/JS PAYLOAD: INJECTED";
            } catch(e) { log.innerText = "JS ERROR: " + e.message; }
        }
        else {
            log.innerText = "UNKNOWN PAYLOAD TYPE";
        }
    }

    document.getElementById('universalBtn').onclick = inject;
    initGPU();
</script>
</body>
</html>
