<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIOM PLAYGROUND | LIVE</title>
    <style>
        :root { --neon: #0f0; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #gui { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid var(--neon); z-index: 1000; font-size: 11px; pointer-events: none; }
        #action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid var(--neon); display: flex; padding: 8px; gap: 8px; z-index: 2000; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: inherit; cursor: pointer; flex: 1; font-size: 10px; text-transform: uppercase; }
        button:active { background: var(--neon); color: #000; }
    </style>
</head>
<body>
    <div id="gui">
        <div>STATUS: <span id="status">CONNECTING...</span></div>
        <div id="payload-meta">ID: NONE</div>
        <div id="remote-html"></div>
    </div>
    <canvas id="mainCanvas"></canvas>
    <div id="action-bar">
        <button onclick="handlePaste()">Paste Payload</button>
        <button onclick="location.reload()">Force Refresh</button>
    </div>

    <script>
        const state = { device: null, ctx: null, currentId: null, size: { w: 0, h: 0 } };

        async function init() {
            if (!navigator.gpu) return document.getElementById('status').innerText = "GPU_UNSUPPORTED";
            const adapter = await navigator.gpu.requestAdapter();
            state.device = await adapter.requestDevice();
            const canvas = document.getElementById('mainCanvas');
            state.ctx = canvas.getContext('webgpu');

            const resize = () => {
                state.size.w = window.innerWidth * window.devicePixelRatio;
                state.size.h = window.innerHeight * window.devicePixelRatio;
                canvas.width = state.size.w;
                canvas.height = state.size.h;
                state.ctx.configure({ device: state.device, format: navigator.gpu.getPreferredCanvasFormat(), alphaMode: 'premultiplied' });
            };
            window.addEventListener('resize', resize);
            resize();

            document.getElementById('status').innerText = "LIVE_BRIDGE_ACTIVE";
            
            // POLLING LOOP WITH CACHE BUSTING
            setInterval(async () => {
                try {
                    // This timestamp forces GitHub Pages to bypass the cache
                    const res = await fetch('./payload.json?cb=' + new Date().getTime());
                    const p = await res.json();
                    if (p.id !== state.currentId) execute(p);
                } catch (e) { console.log("Waiting for push..."); }
            }, 3000); // 3s interval for live deployment
        }

        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                execute(JSON.parse(text));
                document.getElementById('status').innerText = "MANUAL_INJECT_OK";
            } catch (e) { alert("JSON Parse Error"); }
        }

        function execute(p) {
            state.currentId = p.id;
            document.getElementById('payload-meta').innerText = `ID: ${p.id}`;
            document.getElementById('remote-html').innerHTML = p.html || '';
            new Function('p', 'state', p.js)(p, state);
        }

        init();
    </script>
</body>
</html>
