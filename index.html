<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiomatic Shared Playground</title>
    <style>
        body { margin: 0; background: #000; color: #00ff9d; font-family: monospace; overflow: hidden; }
        #console { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: rgba(0,20,10,0.9); padding: 10px; font-size: 12px; overflow-y: auto; border-top: 1px solid #00ff9d; z-index: 100; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; }
        .session-tag { position: absolute; top: 10px; right: 10px; background: #00ff9d; color: #000; padding: 5px 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui-layer"></div>
    <div id="session-info" class="session-tag">IDLE</div>
    <div id="console">Initializing System...<br>> Ready for Agent Payload.</div>

    <script>
        const axLog = (msg) => {
            const c = document.getElementById('console');
            c.innerHTML += `<br>> ${msg}`;
            c.scrollTop = c.scrollHeight;
            // Send to parent/agent if connected
            window.parent.postMessage({ type: 'TELEMETRY_LOG', msg }, '*');
        };

        const executePayload = (packet) => {
            try {
                if (typeof packet === 'string') packet = JSON.parse(packet);
                axLog("Unpacking Payload...");
                document.getElementById('ui-layer').innerHTML = packet.html || "";
                if (packet.js) eval(packet.js);
                axLog("Execution Success.");
            } catch (e) {
                axLog("Execution Error: " + e.message);
            }
        };

        // Handle URL Tokens & Remote Session
        const params = new URLSearchParams(window.location.search);
        const sessionToken = params.get('session');
        if (sessionToken) {
            document.getElementById('session-info').innerText = "SESSION: " + sessionToken;
            axLog("Remote Agent Connected via Token.");
        }

        // Listen for Direct Agent Messaging
        window.addEventListener("message", (e) => {
            if (e.data.type === "EXECUTE_PAYLOAD") executePayload(e.data.payload);
        });
    </script>
</body>
</html>
