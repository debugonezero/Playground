<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiomatic Remote Bridge</title>
    <style>
        body { margin: 0; background: #000; color: #00ff9d; font-family: monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; width: 100%; height: 75%; background: #050505; }
        #output_console { 
            position: absolute; bottom: 0; width: 100%; height: 25%; 
            background: rgba(10, 10, 10, 0.95); border-top: 1px solid #333;
            overflow-y: auto; padding: 10px; font-size: 11px; box-sizing: border-box;
        }
        .log { margin-bottom: 4px; border-left: 2px solid #00ff9d; padding-left: 8px; opacity: 0.8; }
        .sync-indicator { position: absolute; top: 10px; right: 10px; font-size: 9px; color: #555; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="sync-status" class="sync-indicator">SYNC: IDLE</div>
    <div id="output_console">Initializing Axiomatic Bridge...</div>

    <script>
        window.AXIOMATIC_STATE = { last_id: null, logs: [], status: "READY" };
        const consoleEl = document.getElementById('output_console');
        const syncEl = document.getElementById('sync-status');

        window.axiomaticLog = (data) => {
            const entry = document.createElement('div');
            entry.className = 'log';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${JSON.stringify(data)}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            window.AXIOMATIC_STATE.logs.push(data);
        };

        const inject = (payload) => {
            try {
                if (!payload || !payload.js) return;
                window.AXIOMATIC_STATE.status = "EXECUTING";
                
                document.getElementById('canvas-container').innerHTML = payload.html || "";
                
                // Execute JS with payload context
                const run = new Function('payload', payload.js);
                run(payload);
                
                window.axiomaticLog({ event: "Injected", id: payload.id });
            } catch (e) {
                window.axiomaticLog({ event: "Error", msg: e.message });
            }
        };

        // --- THE AUTO-SYNC BRIDGE ---
        // I will provide the specific Gist URL once you've set up the infrastructure
        const GIST_URL = 'https://gist.githubusercontent.com/AxiomaticAgent/6f2e8d3b4a5c6d7e8f9a0b1c2d3e4f5g/raw/payload.json';

        async function sync() {
            try {
                syncEl.innerText = "SYNC: POLLING...";
                const res = await fetch(GIST_URL, { cache: 'no-store' });
                if (!res.ok) throw new Error("Gist Not Found");
                
                const payload = await res.json();

                if (payload.id !== window.AXIOMATIC_STATE.last_id) {
                    window.AXIOMATIC_STATE.last_id = payload.id;
                    inject(payload);
                }
                syncEl.innerText = "SYNC: OK";
            } catch (err) {
                syncEl.innerText = "SYNC: ERROR";
            }
        }

        // Poll every 2 seconds
        setInterval(sync, 2000);
        window.axiomaticLog({ system: "Bridge_Online", mode: "Auto-Sync" });
    </script>
</body>
</html>
