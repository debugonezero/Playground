<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #viewport { flex: 1; position: relative; overflow: hidden; }
        #btn-paste { height: 75px; background: #0f0; color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="viewport"><div style="padding:20px; color:#444;">[ LIVE_ON_GH_PAGES ] WAITING...</div></div>
    <button id="btn-paste">PASTE_OPERATOR</button>

    <script>
        const view = document.getElementById('viewport');
        const btn = document.getElementById('btn-paste');

        // THE FIX: Move the readText to the top of the stack
        btn.onclick = () => {
            navigator.clipboard.readText().then(text => {
                const payload = JSON.parse(text);
                
                // Reset Viewport
                view.innerHTML = "";
                
                if (payload.css) {
                    const s = document.createElement('style');
                    s.textContent = payload.css;
                    view.appendChild(s);
                }
                if (payload.html) {
                    const d = document.createElement('div');
                    d.innerHTML = payload.html;
                    view.appendChild(d);
                }
                if (payload.js) {
                    // Injecting as a script tag to ensure it hits global scope correctly
                    const script = document.createElement('script');
                    script.textContent = `(async (payload) => { ${payload.js} })( ${JSON.stringify(payload)} );`;
                    view.appendChild(script);
                }
            }).catch(err => {
                view.innerHTML = `<div style="color:red; padding:20px;">CLIPBOARD_ERROR: ${err.message}</div>`;
            });
        };
    </script>
</body>
</html>
