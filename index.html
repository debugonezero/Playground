<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta WebGPU Engine</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="gpuCanvas"></canvas>

    <script type="module">
        // 1. SHADER SOURCE (The WGSL "Source Code")
        const shaderCode = `
            @vertex
            fn vs_main(@builtin(vertex_index) idx: u32) -> @builtin(position) vec4f {
                var pos = array<vec2f, 3>(
                    vec2f(0.0, 0.5),
                    vec2f(-0.5, -0.5),
                    vec2f(0.5, -0.5)
                );
                return vec4f(pos[idx], 0.0, 1.0);
            }

            @fragment
            fn fs_main() -> @location(0) vec4f {
                return vec4f(0.0, 1.0, 0.8, 1.0); // Cyan
            }
        `;

        async function init() {
            if (!navigator.gpu) {
                alert("WebGPU not supported. Check Safari Settings > Advanced.");
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            
            const canvas = document.getElementById('gpuCanvas');
            const context = canvas.getContext('webgpu');
            const format = navigator.gpu.getPreferredCanvasFormat();

            context.configure({ device, format });

            // 2. CREATE PIPELINE (The iMac/iPhone GPU bridge)
            const pipeline = device.createRenderPipeline({
                layout: 'auto',
                vertex: {
                    module: device.createShaderModule({ code: shaderCode }),
                    entryPoint: 'vs_main',
                },
                fragment: {
                    module: device.createShaderModule({ code: shaderCode }),
                    entryPoint: 'fs_main',
                    targets: [{ format }],
                },
            });

            function frame() {
                const commandEncoder = device.createCommandEncoder();
                const view = context.getCurrentTexture().createView();
                const renderPass = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view,
                        clearValue: [0, 0, 0, 1],
                        loadOp: 'clear',
                        storeOp: 'store',
                    }],
                });

                renderPass.setPipeline(pipeline);
                renderPass.draw(3);
                renderPass.end();

                device.queue.submit([commandEncoder.finish()]);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        init();
    </script>
</body>
</html>
