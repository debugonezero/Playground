<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #vram-viewport { flex: 1; width: 100%; background: #050505; }
        canvas { width: 100%; height: 100%; display: block; }
        #paste-btn { height: 80px; width: 100%; background: #fff; color: #000; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vram-viewport"><canvas id="main_canvas"></canvas></div>
    <button id="paste-btn">PASTE_PAYLOAD</button>

    <script>
        const btn = document.getElementById('paste-btn');
        
        btn.onclick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                const payload = JSON.parse(text);
                
                // EXECUTE THE PAYLOAD
                if (payload.js) {
                    const execute = new Function('payload', payload.js);
                    execute(payload);
                }
            } catch (err) {
                console.error("Payload Failure:", err);
            }
        };
    </script>
</body>
</html>
