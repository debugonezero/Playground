<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axiomatic Playground | v2.0</title>
    <style>
        :root { --accent: #00ff9d; --bg: #050505; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: 'SF Mono', 'Fira Code', monospace; 
            user-select: none;
        }
        
        #render-target { position: absolute; inset: 0; z-index: 1; }
        
        #overlay { 
            position: absolute; bottom: 20px; left: 20px; right: 20px; 
            z-index: 100; pointer-events: none;
        }

        #console {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
        }

        #log-stream { 
            height: 80px; overflow-y: auto; font-size: 10px; color: #888; 
            margin-bottom: 12px; scroll-behavior: smooth;
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="render-target"></div>

    <div id="overlay">
        <div id="console">
            <div id="log-stream">
                <div class="log-entry">SYSTEM: RESTORED</div>
                <div class="log-entry">HARDWARE: LISTENING</div>
            </div>
            <button class="btn-primary" id="exec-trigger">Paste & Execute</button>
        </div>
    </div>

    <script>
        const stream = document.getElementById('log-stream');
        window.axiomaticLog = (msg) => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        };

        window.inject = async (payload) => {
            try {
                window.axiomaticLog("BOOT: " + payload.id);
                document.getElementById('render-target').innerHTML = payload.html || "";
                
                // Orchestrator Execution
                const task = new Function('payload', payload.js);
                await task(payload);
                window.axiomaticLog("ACTIVE: " + payload.id);
            } catch (e) {
                window.axiomaticLog("CRITICAL: " + e.message);
            }
        };

        document.getElementById('exec-trigger').onclick = async () => {
            try {
                const raw = await navigator.clipboard.readText();
                // Handshake with JSON structure
                const payload = JSON.parse(raw);
                window.inject(payload);
            } catch (e) {
                window.axiomaticLog("CLIPBOARD/JSON ERROR");
            }
        };
    </script>
</body>
</html>
