<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #viewport { flex: 1; position: relative; overflow: hidden; }
        #btn-paste { height: 75px; background: #0f0; color: #000; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="viewport"><div style="padding:20px; color:#444;">[ SYSTEM_READY ]</div></div>
    <button id="btn-paste">PASTE_OPERATOR</button>

    <script>
        const view = document.getElementById('viewport');
        const btn = document.getElementById('btn-paste');
        
        // EXPOSE TO GLOBAL SCOPE for payload access
        window.gpuDevice = null;

        async function initGPU() {
            if (!navigator.gpu) {
                view.innerHTML = "<div style='color:red; padding:20px;'>WEBGPU_NOT_SUPPORTED</div>";
                return;
            }
            const adapter = await navigator.gpu.requestAdapter();
            window.gpuDevice = await adapter.requestDevice();
            console.log("GPU_READY");
        }
        initGPU();

        btn.onclick = () => {
            navigator.clipboard.readText().then(text => {
                const payload = JSON.parse(text);
                view.innerHTML = ""; // Clear UI
                
                if (payload.css) {
                    const s = document.createElement('style');
                    s.textContent = payload.css;
                    view.appendChild(s);
                }
                if (payload.html) {
                    const d = document.createElement('div');
                    d.innerHTML = payload.html;
                    view.appendChild(d);
                }
                if (payload.js) {
                    // Pass the global gpuDevice into the execution context
                    const script = document.createElement('script');
                    script.textContent = `(async () => { 
                        const device = window.gpuDevice;
                        const payload = ${JSON.stringify(payload)};
                        ${payload.js} 
                    })();`;
                    view.appendChild(script);
                }
            }).catch(err => {
                view.innerHTML = `<div style='color:red; padding:20px;'>FAULT: ${err.message}</div>`;
            });
        };
    </script>
</body>
</html>
