<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeta WebGPU Manifold</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffcc; background: rgba(0,20,20,0.8); padding: 10px; border: 1px solid #00ffcc; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SYSTEM: WEBGPU LIVE<br>ENGINE: WGSL / METAL<br>DOMAIN: CRITICAL LINE (s=0.5)</div>
    <canvas id="gpuCanvas"></canvas>

<script type="module">
    const shaderCode = `
        struct Uniforms {
            time: f32,
            width: f32,
            height: f32,
            unused: f32, // Manual padding for 16-byte alignment
        };
        @group(0) @binding(0) var<uniform> u: Uniforms;

        struct VertexOutput {
            @builtin(position) pos: vec4f,
            @location(0) color: vec3f,
        };

        @vertex
        fn vs_main(@builtin(vertex_index) idx: u32) -> VertexOutput {
            let res = 128u;
            let x = f32(idx % res) / f32(res) - 0.5;
            let y = f32(idx / res) / f32(res);
            
            let t = y * 50.0 + 10.0;
            let wave = sin(t * 0.5 - u.time) * cos(x * 10.0);
            let z = wave * 0.1;

            var out: VertexOutput;
            // Simplified projection for debugging
            out.pos = vec4f(x * 1.8, z * 2.0, 0.0, 1.0);
            out.color = vec3f(0.0, 1.0, 0.8); 
            return out;
        }

        @fragment
        fn fs_main(in: VertexOutput) -> @location(0) vec4f {
            return vec4f(in.color, 1.0);
        }
    `;

    async function init() {
        if (!navigator.gpu) return;
        const adapter = await navigator.gpu.requestAdapter();
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('gpuCanvas');
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        context.configure({ device, format, alphaMode: 'premultiplied' });

        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { 
                module: device.createShaderModule({ code: shaderCode }), 
                entryPoint: 'vs_main' 
            },
            fragment: { 
                module: device.createShaderModule({ code: shaderCode }), 
                entryPoint: 'fs_main', 
                targets: [{ format }] 
            },
            primitive: { topology: 'point-list' }
        });

        // 16-byte aligned buffer
        const uniformBuffer = device.createBuffer({
            size: 16,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        });

        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        });

        function frame(time) {
            const uniformData = new Float32Array([time * 0.001, canvas.width, canvas.height, 0]);
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);

            const commandEncoder = device.createCommandEncoder();
            const pass = commandEncoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    clearValue: [0, 0, 0, 1],
                    loadOp: 'clear', storeOp: 'store',
                }]
            });

            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(128 * 128); 
            pass.end();

            device.queue.submit([commandEncoder.finish()]);
            requestAnimationFrame(frame);
        }

        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(frame);
    }

    init().catch(console.error);
</script>

</body>
</html>
