<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DebugOneZero | Riemann Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --glow: #00ffcc; --gold: #ffcc00; --bg: #030808; --panel: rgba(5, 15, 15, 0.85); }
        
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; background: var(--bg); overflow: hidden; 
            font-family: 'JetBrains Mono', 'Menlo', monospace; 
            color: white; height: 100vh; width: 100vw;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* HUD - Fixed Top */
        #header-hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 90%; max-width: 500px;
            background: var(--panel); border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 15px; border-radius: 4px; text-align: center;
            backdrop-filter: blur(8px); pointer-events: none;
        }

        /* Footer - Fixed Bottom */
        #footer-formula {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 95%; max-width: 600px;
            background: var(--panel); border-top: 2px solid var(--glow);
            padding: 15px; border-radius: 4px; text-align: center;
            backdrop-filter: blur(8px); pointer-events: none;
        }

        .username { color: var(--gold); font-weight: bold; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 5px; }
        .stats-row { display: flex; justify-content: space-around; font-size: 0.6rem; color: var(--glow); margin-top: 10px; }
        
        /* Math Styling */
        .mjx-chtml { margin: 8px 0 !important; font-size: 0.85rem !important; }
        .formula-caption { font-size: 0.55rem; color: #666; letter-spacing: 1px; }

        #scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 204, 0.02) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="scanline"></div>
    <canvas id="gpuCanvas"></canvas>

    <div id="header-hud">
        <div class="username">@DEBUGONEZERO</div>
        <div style="font-size: 0.6rem; color: #444;">SYSTEM: WEBGPU_CORE_3.2</div>
        <div class="stats-row">
            <div>Σ: 0.5</div>
            <div>MOD: τ (2π)</div>
            <div>FPS: 60</div>
            <div>STATUS: SYNC</div>
        </div>
    </div>

    <div id="footer-formula">
        <div class="formula-caption">SYMMETRIC FUNCTIONAL EQUATION</div>
        $$\zeta(s) = 2^s \pi^{s-1} \sin\left(\frac{\pi s}{2}\right) \Gamma(1-s) \zeta(1-s)$$
        <div class="formula-caption">TAU-DISTRIBUTION INTEGRAL</div>
        $$\Phi(s) = \int_{0}^{\infty} \frac{x^{s-1}}{e^{\tau x} - 1} dx$$
    </div>

<script type="module">
    const shaderCode = `
        struct Uniforms {
            time: f32,
            width: f32,
            height: f32,
            padding: f32,
        };
        @group(0) @binding(0) var<uniform> u: Uniforms;

        struct VertexOutput {
            @builtin(position) pos: vec4f,
            @location(0) color: vec3f,
        };

        @vertex
        fn vs_main(@builtin(vertex_index) idx: u32) -> VertexOutput {
            let res = 120u; 
            let x = f32(idx % res) / f32(res) - 0.5; 
            let y = f32(idx / res) / f32(res) - 0.5;
            
            let tau = 6.2831853071;
            let t = (y + 0.5) * 45.0 + 10.0;
            
            // Zeta oscillation math
            let wave = sin(t * 0.35 - u.time) * cos(x * tau * log(t + 1.0));
            
            // Zeros calculation
            let z_ref = 0.05 / (0.08 + pow(t - 14.134, 2.0)) + 0.05 / (0.08 + pow(t - 21.022, 2.0));
            let z = (wave * 0.18) - z_ref;

            // VERTICAL CENTERING LOGIC
            // Shifting py by a constant factor ensures the manifold is vertically centered
            // despite the projection narrowing at the "horizon".
            let view_dist = y + 1.6;
            let px = x * 2.4 / view_dist;
            let py = (z * 4.5) / view_dist; 

            var out: VertexOutput;
            // We use z-depth of y to create the receding grid effect
            out.pos = vec4f(px, py, y, 1.0);
            
            let zeroGlow = smoothstep(0.04, 0.0, abs(z));
            out.color = mix(vec3f(0.0, 0.9, 0.8), vec3f(1.0, 0.7, 0.0), zeroGlow);
            return out;
        }

        @fragment
        fn fs_main(in: VertexOutput) -> @location(0) vec4f {
            // Fading intensity based on distance (w)
            let intensity = 1.0 / in.pos.w;
            return vec4f(in.color * intensity, 1.0);
        }
    `;

    async function init() {
        if (!navigator.gpu) return;
        const adapter = await navigator.gpu.requestAdapter();
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('gpuCanvas');
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        context.configure({ device, format, alphaMode: 'premultiplied' });

        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: shaderCode }), entryPoint: 'vs_main' },
            fragment: { module: device.createShaderModule({ code: shaderCode }), entryPoint: 'fs_main', targets: [{ format }] },
            primitive: { topology: 'point-list' }
        });

        const uniformBuffer = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
        });

        function frame(time) {
            device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([time * 0.001, canvas.width, canvas.height, 0]));
            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
                colorAttachments: [{ 
                    view: context.getCurrentTexture().createView(), 
                    clearValue: [0.01, 0.02, 0.02, 1], 
                    loadOp: 'clear', storeOp: 'store' 
                }]
            });
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(120 * 120);
            pass.end();
            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(frame);
        }

        const resize = () => {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
        };
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(frame);
    }
    init();
</script>
</body>
</html>
