<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIOM PLAYGROUND | v2.0</title>
    <style>
        :root { --neon: #0f0; --bg: #050505; --dark-gray: #1a1a1a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        
        /* Dashboard Overlay */
        #gui { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid var(--neon); z-index: 1000; font-size: 12px; pointer-events: none; max-width: 80vw; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .meta { color: #080; font-size: 10px; margin-top: 5px; }

        /* Action Bar (The Paste Button is here) */
        #action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--dark-gray); border-top: 1px solid var(--neon); display: flex; padding: 10px; gap: 10px; z-index: 2000; box-sizing: border-box; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; font-family: inherit; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.2s; flex: 1; }
        button:hover { background: var(--neon); color: #000; }
        button:active { transform: translateY(2px); }

        /* Hidden Input for Pasting */
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
        
        @media (max-width: 600px) { 
            #gui { font-size: 10px; } 
            button { padding: 12px 5px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="gui">
        <div>STATUS: <span id="status">INIT_GPU...</span></div>
        <div id="payload-meta" class="meta">ID: NONE</div>
        <div id="remote-html"></div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div id="action-bar">
        <button onclick="handlePaste()">Paste Payload</button>
        <button onclick="location.reload()">Reset Hardware</button>
    </div>

    <script>
        const state = { device: null, ctx: null, currentId: null, size: { w: 0, h: 0 } };

        async function init() {
            if (!navigator.gpu) {
                document.getElementById('status').innerText = "FATAL: WEBGPU_UNSUPPORTED";
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            state.device = await adapter.requestDevice();
            const canvas = document.getElementById('mainCanvas');
            state.ctx = canvas.getContext('webgpu');

            const resize = () => {
                state.size.w = window.innerWidth * window.devicePixelRatio;
                state.size.h = window.innerHeight * window.devicePixelRatio;
                canvas.width = state.size.w;
                canvas.height = state.size.h;
                state.ctx.configure({
                    device: state.device,
                    format: navigator.gpu.getPreferredCanvasFormat(),
                    alphaMode: 'premultiplied'
                });
            };
            window.addEventListener('resize', resize);
            resize();

            document.getElementById('status').innerText = "SYSTEM_READY";
            startPolling();
        }

        // The Paste Button Logic
        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                const p = JSON.parse(text);
                executePayload(p);
                document.getElementById('status').innerText = "MANUAL_INJECT_SUCCESS";
            } catch (e) {
                alert("Paste Error: Ensure clipboard contains valid JSON payload.");
                console.error(e);
            }
        }

        function executePayload(p) {
            if (p.id === state.currentId) return;
            state.currentId = p.id;
            document.getElementById('payload-meta').innerText = `ID: ${p.id}`;
            document.getElementById('remote-html').innerHTML = p.html || '';
            
            // The Injection
            const run = new Function('p', 'state', p.js);
            run(p, state);
        }

        function startPolling() {
            setInterval(async () => {
                try {
                    const res = await fetch('payload.json?nocache=' + Date.now());
                    const p = await res.json();
                    executePayload(p);
                } catch (e) { /* Passive wait */ }
            }, 2000);
        }

        init();
    </script>
</body>
</html>
