<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Lab // DebugOneZero</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100dvh; }
        #view { flex: 1; position: relative; border-bottom: 1px solid #222; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { padding: 15px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; }
        #log { font-size: 10px; color: #666; }
        button { background: #0f0; color: #000; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="view"><canvas id="gpuCanvas"></canvas></div>
    <div id="ui">
        <div id="status-container">
            <div id="st">● OFFLINE</div>
            <div id="log">Awaiting Payload...</div>
        </div>
        <button onclick="paster()">PASTE_PAYLOAD</button>
    </div>
    <script>
        const state = { device: null, uniforms: {}, buffers: {} };
        const log = (m) => document.getElementById('log').innerText = m;
        const st = (m) => document.getElementById('st').innerText = "● " + m;

        async function init() {
            if (!navigator.gpu) return st("NO_WEBGPU");
            const ad = await navigator.gpu.requestAdapter();
            state.device = await ad.requestDevice();
            const canvas = document.getElementById('gpuCanvas');
            state.ctx = canvas.getContext('webgpu');
            state.ctx.configure({ device: state.device, format: navigator.gpu.getPreferredCanvasFormat() });
            st("READY"); log("Device: " + ad.name);
        }

        async function paster() {
            try {
                const txt = await navigator.clipboard.readText();
                const payload = JSON.parse(txt);
                
                // UPDATE HTML IF PRESENT
                if (payload.html) document.getElementById('view').innerHTML = payload.html;
                
                // EXECUTE JS - The "Sovereign" Way
                if (payload.js) {
                    // We use an immediately invoked function expression (IIFE)
                    const fn = new Function('p', 'state', `return (async () => { ${payload.js} })();`);
                    await fn(payload, state);
                    st("LIVE");
                }
            } catch (e) { log("ERR: " + e.message); console.error(e); }
        }
        init();
    </script>
</body>
</html>
