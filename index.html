<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIOM TERMINAL</title>
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid var(--neon); z-index: 100; font-size: 12px; pointer-events: none; }
        #bar { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; z-index: 200; border-top: 1px solid var(--neon); background: #111; }
        button { flex: 1; background: transparent; color: var(--neon); border: none; padding: 20px; font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:active { background: var(--neon); color: #000; }
    </style>
</head>
<body>
    <div id="overlay">SYSTEM: STANDBY_FOR_INJECTION<br><span id="meta">ID: NULL</span></div>
    <canvas id="canvas"></canvas>
    <div id="bar">
        <button onclick="inject()">PASTE_PAYLOAD</button>
        <button onclick="location.reload()">FLUSH_VRAM</button>
    </div>

    <script>
        const state = { device: null, ctx: null, currentId: null, size: { w: 0, h: 0 } };

        async function init() {
            if (!navigator.gpu) return alert("WebGPU Fail");
            const adapter = await navigator.gpu.requestAdapter();
            state.device = await adapter.requestDevice();
            const canvas = document.getElementById('canvas');
            state.ctx = canvas.getContext('webgpu');

            const resize = () => {
                state.size.w = window.innerWidth * window.devicePixelRatio;
                state.size.h = window.innerHeight * window.devicePixelRatio;
                canvas.width = state.size.w;
                canvas.height = state.size.h;
                state.ctx.configure({ device: state.device, format: navigator.gpu.getPreferredCanvasFormat(), alphaMode: 'premultiplied' });
            };
            window.addEventListener('resize', resize);
            resize();
        }

        async function inject() {
            try {
                const raw = await navigator.clipboard.readText();
                const p = JSON.parse(raw);
                state.currentId = p.id;
                document.getElementById('meta').innerText = `ID: ${p.id}`;
                // Direct execution from clipboard string
                new Function('p', 'state', p.js)(p, state);
            } catch (e) {
                alert("CLIPBOARD_ERR: Invalid JSON");
            }
        }

        init();
    </script>
</body>
</html>
