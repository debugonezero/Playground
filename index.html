<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axiomatic Hardware Bridge</title>
    <style>
        :root { --neon: #00ff9d; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'SF Mono', monospace; overflow: hidden; }
        
        #canvas-container { position: absolute; top: 0; width: 100%; height: 70%; background: #000; }
        
        #output_console { 
            position: absolute; bottom: 0; width: 100%; height: 30%; 
            background: rgba(10, 10, 10, 0.98); border-top: 1px solid #333;
            overflow-y: auto; padding: 15px; font-size: 11px; box-sizing: border-box;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }

        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--neon); padding-left: 10px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        
        .header { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="output_console">
        <div class="header">
            <span>System: Axiomatic v1.0</span>
            <span id="gpu-status">GPU: Awaiting Adapter</span>
        </div>
        <div id="logs"></div>
    </div>

    <script>
        window.AXIOMATIC_STATE = { logs: [], activePayload: null };
        const logContainer = document.getElementById('logs');
        const gpuStatus = document.getElementById('gpu-status');

        // Professional Logging System
        window.axiomaticLog = (data) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString().split(' ')[0];
            entry.innerHTML = `<span style="color:#555">[${timestamp}]</span> ${typeof data === 'object' ? JSON.stringify(data) : data}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            window.AXIOMATIC_STATE.logs.push({ t: Date.now(), data });
        };

        // The Injection Bridge
        window.inject = async (payload) => {
            try {
                window.axiomaticLog("Initializing Injection: " + payload.id);
                
                // 1. Clear previous UI
                document.getElementById('canvas-container').innerHTML = payload.html || "";
                
                // 2. Build and execute the orchestration
                const executionTask = new Function('payload', payload.js);
                await executionTask(payload);
                
                window.AXIOMATIC_STATE.activePayload = payload.id;
                window.axiomaticLog("Success: " + payload.id + " running.");
            } catch (err) {
                window.axiomaticLog("CRITICAL ERROR: " + err.message);
            }
        };

        // Check WebGPU Support
        (async () => {
            if (!navigator.gpu) {
                window.axiomaticLog("WebGPU not supported on this browser/hardware.");
                gpuStatus.innerText = "GPU: UNSUPPORTED";
                return;
            }
            const adapter = await navigator.gpu.requestAdapter();
            if (adapter) {
                gpuStatus.innerText = `GPU: ${adapter.name || 'Generic WebGPU'}`;
                window.axiomaticLog("Hardware Bridge Ready.");
            }
        })();
    </script>
</body>
</html>
