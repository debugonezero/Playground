<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DebugOneZero | Modular Manifold</title>
    <style>
        :root { --glow: #00ffcc; --gold: #ffcc00; --bg: #000; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }
        canvas { position: absolute; inset: 0; z-index: 1; touch-action: none; }
        
        /* Floating HUD */
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 10, 10, 0.8); padding: 15px;
            border: 1px solid var(--glow); backdrop-filter: blur(10px);
            pointer-events: none;
        }
        #footer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 90%; text-align: center; pointer-events: none;
        }
        .username { color: var(--gold); font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <canvas id="gpuCanvas"></canvas>
    
    <div id="hud">
        <div class="username">@DEBUGONEZERO</div>
        <div id="status" style="font-size: 0.6rem; color: var(--glow);">GPU: INITIALIZING...</div>
    </div>

    <div id="footer">
        <div id="math-display"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
