<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiomatic Execution Bridge</title>
    <style>
        body { margin: 0; background: #000; color: #00ff9d; font-family: monospace; }
        #canvas-container { position: absolute; inset: 0; }
        #output_console { 
            position: absolute; bottom: 0; width: 100%; height: 25%; 
            background: rgba(10, 10, 10, 0.95); border-top: 2px solid #333;
            overflow-y: auto; padding: 10px; font-size: 11px; z-index: 1000;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #00ff9d; padding-left: 8px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="output_console">Initializing Axiomatic Bridge...</div>

    <script>
        const consoleEl = document.getElementById('output_console');
        
        // The Telemetry Logger - This is what the Agent reads
        window.axiomaticLog = (data) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${JSON.stringify(data)}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            
            // Broadcast for the Agent to catch
            window.parent.postMessage({ type: "PAYLOAD_OUTPUT", data }, "*");
        };

        const execute = (packet) => {
            try {
                const data = typeof packet === 'string' ? JSON.parse(packet) : packet;
                document.getElementById('canvas-container').innerHTML = data.html || "";
                if (data.js) eval(data.js);
                window.axiomaticLog({ status: "Payload Injected", timestamp: Date.now() });
            } catch (err) {
                window.axiomaticLog({ error: err.message });
            }
        };

        // Listen for the Agent (Shared Session Bridge)
        window.addEventListener("message", (event) => {
            if (event.data.type === "EXECUTE_PAYLOAD") {
                execute(event.data.payload);
            }
        });

        // Check for URL-based session start
        const sessionID = new URLSearchParams(window.location.search).get('session');
        if (sessionID) {
            window.axiomaticLog({ session: sessionID, status: "Connected" });
        }
    </script>
</body>
</html>
