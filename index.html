<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DebugOneZero | Clipboard Terminal</title>
    <style>
        :root { --bg: #000; --accent: #00ffcc; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; 
            height: 100dvh; display: grid; grid-template-rows: 1fr auto; overflow: hidden;
        }

        #viz-container { position: relative; width: 100%; height: 100%; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }

        /* Control Dock */
        #dock { 
            background: #0a0a0a; border-top: 1px solid #222; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            padding-bottom: env(safe-area-inset-bottom); /* iOS Notch Support */
        }

        .btn-group { display: flex; gap: 10px; }
        button { 
            flex: 1; padding: 15px; border-radius: 8px; border: none;
            font-weight: bold; font-family: inherit; font-size: 0.8rem;
            text-transform: uppercase; cursor: pointer;
        }
        #pasteBtn { background: var(--accent); color: #000; }
        #clearBtn { background: #1a1a1a; color: #666; border: 1px solid #333; }

        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        #status { font-size: 0.6rem; color: var(--accent); margin-top: 5px; }
    </style>
</head>
<body>

<div id="viz-container">
    <canvas id="gpuCanvas"></canvas>
    <div id="hud">
        <div style="color:var(--gold); font-size:0.8rem; letter-spacing:2px;">@DEBUGONEZERO</div>
        <div id="status">WEBGPU: STANDBY</div>
    </div>
</div>

<div id="dock">
    <div id="log" style="font-size: 0.6rem; color: #444; text-align: center;">READY FOR PAYLOAD</div>
    <div class="btn-group">
        <button id="clearBtn">Clear GPU</button>
        <button id="pasteBtn">Paste & Execute</button>
    </div>
</div>

<script type="module">
    let device, pipeline, bindGroup, uniformBuffer, context, format;

    async function init() {
        if (!navigator.gpu) return;
        const adapter = await navigator.gpu.requestAdapter();
        device = await adapter.requestDevice();
        const canvas = document.getElementById('gpuCanvas');
        context = canvas.getContext('webgpu');
        format = navigator.gpu.getPreferredCanvasFormat();
        
        const dpr = Math.min(window.devicePixelRatio, 2);
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;

        context.configure({ device, format, alphaMode: 'premultiplied' });
        uniformBuffer = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        
        document.getElementById('status').innerText = "GPU: READY";
        requestAnimationFrame(frame);
    }

    async function executeFromClipboard() {
        const log = document.getElementById('log');
        try {
            const code = await navigator.clipboard.readText();
            const shaderModule = device.createShaderModule({ code });
            
            pipeline = device.createRenderPipeline({
                layout: 'auto',
                vertex: { module: shaderModule, entryPoint: 'vs_main' },
                fragment: { module: shaderModule, entryPoint: 'fs_main', targets: [{ format }] },
                primitive: { topology: 'point-list' }
            });

            bindGroup = device.createBindGroup({
                layout: pipeline.getBindGroupLayout(0),
                entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
            });

            log.innerText = "SUCCESS: SHADER COMPILED";
            log.style.color = "#00ffcc";
        } catch (err) {
            log.innerText = "ERROR: INVALID SHADER PAYLOAD";
            log.style.color = "#ff4444";
            console.error(err);
        }
    }

    function frame(time) {
        if (pipeline) {
            device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([time * 0.001, 55.0, 1.0, 2.0]));
            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
                colorAttachments: [{ 
                    view: context.getCurrentTexture().createView(), 
                    clearValue: [0, 0, 0, 1], 
                    loadOp: 'clear', 
                    storeOp: 'store' 
                }]
            });
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(200 * 200);
            pass.end();
            device.queue.submit([encoder.finish()]);
        }
        requestAnimationFrame(frame);
    }

    document.getElementById('pasteBtn').onclick = executeFromClipboard;
    document.getElementById('clearBtn').onclick = () => { pipeline = null; document.getElementById('log').innerText = "GPU CLEARED"; };
    
    init();
</script>

</body>
</html>
