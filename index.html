<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Axiom Executive</title>
    <style>
        body, html { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
        #ui-layer { position: fixed; top: 10px; right: 10px; z-index: 1000; }
        button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; }
        #canvas-root { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="copy-prompt">COPY AGENT PROMPT</button>
    </div>
    <div id="canvas-root"></div>

    <script>
        const state = {
            device: null,
            ctx: null,
            currentId: null,
            size: { w: window.innerWidth, h: window.innerHeight }
        };

        // Execution Bridge
        function ingest(p) {
            if (state.currentId === p.id) return;
            state.currentId = p.id;
            document.getElementById('canvas-root').innerHTML = p.html;
            try {
                // Functional Injection
                new Function('p', 'state', p.js)(p, state);
            } catch (e) { console.error("Injection Failure:", e); }
        }

        // State-Sync Prompt Logic
        document.getElementById('copy-prompt').onclick = () => {
            const promptSpec = {
                role: "WebGPU Technical Architect",
                context: "Axiom Playground Receiver",
                specs: {
                    engine: "new Function('p', 'state', p.js)",
                    globals: ["state.device", "state.ctx", "state.size", "p.wgsl"],
                    constraints: "rAF loops must check (state.currentId !== p.id)",
                    input: "payload.json"
                }
            };
            navigator.clipboard.writeText(JSON.stringify(promptSpec, null, 2));
            alert("Technical Context Copied");
        };

        async function boot() {
            const adp = await navigator.gpu.requestAdapter();
            state.device = await adp.requestDevice();
            
            (async function poll() {
                try {
                    const r = await fetch('payload.json?v=' + Date.now());
                    ingest(await r.json());
                } catch (e) {}
                setTimeout(poll, 1000);
            })();
        }

        window.onresize = () => { 
            state.size.w = window.innerWidth; 
            state.size.h = window.innerHeight; 
        };

        boot();
    </script>
</body>
</html>
