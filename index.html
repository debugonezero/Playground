<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeta Quantum Manifold</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            color: #00ffcc; background: rgba(0, 20, 20, 0.7);
            padding: 15px; border: 1px solid #00ffcc;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
        .glitch { animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="glitch">System: Advanced Visualization</div>
        <div>Mode: Phase-Rotation (Integer Map)</div>
        <div>Engine: WebGL2 / f32 Parallel</div>
        <hr style="border: 0; border-top: 1px solid #00ffcc;">
        <div id="stats">Im[s] -> 14.134725...</div>
    </div>
    <canvas id="canvas"></canvas>

<script type="module">
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl2');

    const vs = `#version 300 es
    layout(location = 0) in vec2 a_gridPos;
    uniform float u_time;
    uniform vec2 u_resolution;
    out float v_height;
    out vec3 v_color;

    void main() {
        // The "Source Code": Mapping the Zeta critical line
        float t = a_gridPos.y * 50.0 + 10.0; // Moving up the t-axis
        float sigma = a_gridPos.x; 

        // Simulate the harmonic oscillation near the zeros
        // We use 14.134, 21.022, 25.010 as frequency anchors
        float wave = sin(t * 0.5 - u_time) * cos(sigma * 10.0);
        float zeroImpact = 1.0 / (0.1 + abs(t - 14.134725));
        
        float z = wave * 0.2 + (zeroImpact * 0.05);
        
        v_height = z;
        // Color based on "Phase Rotation" (The clock-based system we discussed)
        v_color = vec3(0.0, 0.8, 1.0) * (0.5 + 0.5 * sin(t + u_time));
        
        // Perspective projection
        vec3 pos = vec3(a_gridPos.x, z, a_gridPos.y - 1.0);
        gl_Position = vec4(pos.x * 1.5, pos.y * 2.0, pos.z, 1.5 - pos.z);
        gl_PointSize = 2.0;
    }`;

    const fs = `#version 300 es
    precision highp float;
    in float v_height;
    in vec3 v_color;
    out vec4 outColor;

    void main() {
        // Add a "glow" effect to the peaks and zeros
        float brightness = abs(v_height) * 2.0 + 0.4;
        outColor = vec4(v_color * brightness, 1.0);
    }`;

    // Boilerplate setup
    function createShader(gl, type, source) {
        const s = gl.createShader(type);
        gl.shaderSource(s, source);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
        return s;
    }

    const program = gl.createProgram();
    gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vs));
    gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(program);

    // Create a high-density grid for the manifold
    const gridData = [];
    const resolution = 100;
    for(let i=0; i<resolution; i++) {
        for(let j=0; j<resolution; j++) {
            gridData.push((i/resolution) - 0.5, j/resolution);
        }
    }

    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(gridData), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    const uTime = gl.getUniformLocation(program, "u_time");

    function draw(time) {
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);

        gl.useProgram(program);
        gl.uniform1f(uTime, time * 0.001);
        gl.bindVertexArray(vao);
        gl.drawArrays(gl.POINTS, 0, gridData.length / 2);
        
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth * window.devicePixelRatio;
        canvas.height = window.innerHeight * window.devicePixelRatio;
    });
    window.dispatchEvent(new Event('resize'));
    requestAnimationFrame(draw);
</script>
</body>
</html>
