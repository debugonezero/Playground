<!DOCTYPE html>
<html>
<head>
    <title>Sovereign Lab // WebGPU Host</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #canvas-container { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #ui { background: #111; border-top: 1px solid #333; padding: 10px; display: flex; gap: 10px; align-items: center; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        #status { font-size: 10px; color: #888; }
        textarea { position: absolute; top: -100px; } /* Hidden paste target */
    </style>
</head>
<body>
    <div id="canvas-container"><canvas id="gpuCanvas"></canvas></div>
    <div id="ui">
        <button onclick="handlePaste()">[ PASTE PAYLOAD ]</button>
        <div id="status">HW_STATUS: AWAITING_INITIALIZATION</div>
    </div>

    <script>
        let state = { device: null, ctx: null, pipeline: null, buffers: {}, params: {} };

        async function initGPU() {
            if (!navigator.gpu) return alert("WebGPU not supported");
            state.adapter = await navigator.gpu.requestAdapter();
            state.device = await state.adapter.requestDevice();
            state.ctx = document.getElementById('gpuCanvas').getContext('webgpu');
            state.ctx.configure({ device: state.device, format: navigator.gpu.getPreferredCanvasFormat() });
            document.getElementById('status').innerText = "HW_STATUS: GPU_READY";
        }

        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                const payload = JSON.parse(text);
                
                // Check if it's a Micro-Payload (Key-Value Edit) or a Full Rebuild
                if (payload.type === "EDIT") {
                    updateState(payload.edits);
                } else {
                    rebuildKernel(payload);
                }
            } catch (e) {
                document.getElementById('status').innerText = "ERR: " + e.message;
            }
        }

        function updateState(edits) {
            // Update uniforms or constants without stopping the device
            for (let [key, value] of Object.entries(edits)) {
                state.params[key] = value;
                if (state.buffers[key]) {
                    state.device.queue.writeBuffer(state.buffers[key], 0, new Float32Array([value]));
                }
            }
            document.getElementById('status').innerText = "STATUS: PATCH_APPLIED";
        }

        async function rebuildKernel(payload) {
            // Full kernel rebuild logic using the Tiled GEMM schema
            // ... (Your optimized WGSL logic here) ...
            document.getElementById('status').innerText = "STATUS: KERNEL_REBUILT";
        }

        initGPU();
    </script>
</body>
</html>
