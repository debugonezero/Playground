<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DebugOneZero | WebGPU Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00ffcc; background: rgba(0, 20, 20, 0.85);
            padding: 15px; border: 1px solid #00ffcc;
            pointer-events: none; text-transform: uppercase; line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>SYSTEM:</b> WEBGPU 1.1 LIVE<br>
        <b>ENGINE:</b> WGSL / METAL 3.2<br>
        <b>STATUS:</b> SIGNAL DETECTED
    </div>
    <canvas id="gpuCanvas"></canvas>

<script type="module">
    const shaderCode = `
        struct Uniforms {
            time: f32,
            width: f32,
            height: f32,
            padding: f32, // CRITICAL: Forces 16-byte alignment for Safari
        };
        @group(0) @binding(0) var<uniform> u: Uniforms;

        struct VertexOutput {
            @builtin(position) pos: vec4f,
            @location(0) color: vec3f,
        };

        @vertex
        fn vs_main(@builtin(vertex_index) idx: u32) -> VertexOutput {
            let res = 128u; 
            let x = f32(idx % res) / f32(res) - 0.5;
            let y = f32(idx / res) / f32(res) - 0.5;
            
            // Zeta Oscillation Formula
            let t = (y + 0.5) * 50.0 + 10.0;
            let wave = sin(t * 0.5 - u.time) * cos(x * 10.0);
            
            // 3D Perspective Projection (Simulated)
            let z_depth = (y + 1.0);
            let x_proj = x * 2.0 / z_depth;
            let y_proj = (wave * 0.4) / z_depth;

            var out: VertexOutput;
            out.pos = vec4f(x_proj, y_proj, 0.0, 1.0);
            out.color = vec3f(0.0, 1.0, 0.85) * (0.7 + 0.3 * wave);
            return out;
        }

        @fragment
        fn fs_main(in: VertexOutput) -> @location(0) vec4f {
            return vec4f(in.color, 1.0);
        }
    `;

    async function init() {
        if (!navigator.gpu) {
            document.body.innerHTML = "<h1 style='color:red; padding:50px;'>WebGPU Not Detected. Disable Low Power Mode.</h1>";
            return;
        }

        const adapter = await navigator.gpu.requestAdapter();
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('gpuCanvas');
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        context.configure({ 
            device, 
            format, 
            alphaMode: 'premultiplied' // Essential for Safari compositing
        });

        const shaderModule = device.createShaderModule({ code: shaderCode });
        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: shaderModule, entryPoint: 'vs_main' },
            fragment: { module: shaderModule, entryPoint: 'fs_main', targets: [{ format }] },
            primitive: { topology: 'point-list' }
        });

        // Setup Uniform Buffer (Exactly 16 bytes)
        const uniformBuffer = device.createBuffer({
            size: 16,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        });

        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        });

        function frame(time) {
            // Buffer must be exactly 4 floats (16 bytes)
            const uniformData = new Float32Array([time * 0.001, canvas.width, canvas.height, 0]);
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);

            const commandEncoder = device.createCommandEncoder();
            const pass = commandEncoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    clearValue: [0, 0, 0, 1],
                    loadOp: 'clear', storeOp: 'store',
                }]
            });

            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(128 * 128); // 16k Points
            pass.end();

            device.queue.submit([commandEncoder.finish()]);
            requestAnimationFrame(frame);
        }

        const resize = () => {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
        };
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(frame);
    }

    init().catch(err => alert("GPU Init Error: " + err));
</script>
</body>
</html>
